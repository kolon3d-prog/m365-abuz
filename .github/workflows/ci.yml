name: CI
on:
  push:
  pull_request:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -l .
        shell: bash
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./...
